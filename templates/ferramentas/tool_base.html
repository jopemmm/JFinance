{% extends "base.html" %}

{% block title %}{{ tool.title }} — J-Finance{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
    .tool-page {
        padding: var(--space-8) 0 var(--space-20);
    }

    .tool-breadcrumb {
        font-size: var(--text-sm);
        color: var(--color-text-faint);
        margin-bottom: var(--space-6);
        display: flex;
        align-items: center;
        gap: var(--space-2);
    }

    .tool-breadcrumb a {
        color: var(--color-gold);
        font-weight: 500;
    }

    .tool-breadcrumb a:hover {
        color: var(--color-gold-hover);
    }

    .tool-header {
        margin-bottom: var(--space-10);
    }

    .tool-header__title {
        font-family: var(--font-display);
        font-size: var(--text-3xl);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: var(--space-3);
        color: var(--color-text);
    }

    .tool-header__description {
        font-size: var(--text-lg);
        color: var(--color-text-muted);
        line-height: 1.7;
        max-width: 640px;
    }

    .tool-layout {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: var(--space-8);
        align-items: start;
    }

    /* INPUT PANEL */
    .tool-panel {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        padding: var(--space-6);
        position: sticky;
        top: calc(72px + var(--space-4));
    }

    [data-theme="dark"] .tool-panel {
        background: var(--color-surface);
        border-color: var(--color-border);
    }

    .tool-panel__title {
        font-family: var(--font-display);
        font-size: var(--text-lg);
        font-weight: 600;
        margin-bottom: var(--space-5);
        color: var(--color-text);
        padding-bottom: var(--space-3);
        border-bottom: 1px solid var(--color-divider);
    }

    .tool-field {
        margin-bottom: var(--space-4);
    }

    .tool-field:last-of-type {
        margin-bottom: var(--space-6);
    }

    .tool-field__label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--space-2);
        font-size: var(--text-sm);
        font-weight: 500;
        color: var(--color-text);
    }

    .tool-field__value {
        font-family: var(--font-mono);
        font-size: var(--text-sm);
        color: var(--color-gold);
        font-weight: 600;
    }

    .tool-field input[type="range"] {
        width: 100%;
        height: 6px;
        -webkit-appearance: none;
        appearance: none;
        background: var(--color-surface-offset);
        border-radius: var(--radius-full);
        outline: none;
        cursor: pointer;
    }

    .tool-field input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--color-gold);
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(201, 168, 76, 0.4);
        transition: transform var(--transition-fast);
    }

    .tool-field input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.15);
    }

    .tool-field input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--color-gold);
        cursor: pointer;
        border: none;
        box-shadow: 0 2px 6px rgba(201, 168, 76, 0.4);
    }

    .tool-field input[type="number"],
    .tool-field select {
        width: 100%;
        padding: var(--space-2) var(--space-3);
        border: 1.5px solid var(--color-border);
        border-radius: var(--radius-md);
        background: var(--color-bg);
        color: var(--color-text);
        font-family: var(--font-mono);
        font-size: var(--text-sm);
        transition: border-color var(--transition);
    }

    .tool-field input[type="number"]:focus,
    .tool-field select:focus {
        border-color: var(--color-gold);
        box-shadow: 0 0 0 3px var(--color-gold-glow);
        outline: none;
    }

    .tool-actions {
        display: flex;
        gap: var(--space-3);
    }

    .tool-actions .btn {
        flex: 1;
    }

    /* OUTPUT PANEL */
    .tool-output {
        display: flex;
        flex-direction: column;
        gap: var(--space-6);
    }

    .tool-chart-card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        padding: var(--space-6);
        position: relative;
    }

    [data-theme="dark"] .tool-chart-card {
        background: var(--color-surface);
        border-color: var(--color-border);
    }

    .tool-chart-card canvas {
        max-height: 400px;
    }

    .tool-results-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: var(--space-4);
    }

    .tool-result {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--space-4) var(--space-5);
        text-align: center;
        transition: border-color var(--transition);
    }

    .tool-result:hover {
        border-color: var(--color-gold);
    }

    [data-theme="dark"] .tool-result {
        background: var(--color-surface);
        border-color: var(--color-border);
    }

    .tool-result__label {
        font-size: var(--text-xs);
        color: var(--color-text-faint);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
        margin-bottom: var(--space-1);
    }

    .tool-result__value {
        font-family: var(--font-mono);
        font-size: var(--text-xl);
        font-weight: 700;
        color: var(--color-gold);
    }

    /* FORMULA SECTION */
    .tool-formula-section {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        padding: var(--space-6);
        margin-top: var(--space-6);
    }

    .tool-formula-section__title {
        font-family: var(--font-display);
        font-size: var(--text-lg);
        font-weight: 600;
        margin-bottom: var(--space-4);
        color: var(--color-text);
    }

    .tool-formula-section__title::after {
        content: '';
        display: block;
        width: 32px;
        height: 2px;
        background: var(--color-gold);
        margin-top: var(--space-2);
        border-radius: var(--radius-full);
    }

    .formula-block {
        font-family: var(--font-mono);
        font-size: var(--text-base);
        background: var(--color-surface-2);
        border-radius: var(--radius-md);
        padding: var(--space-4) var(--space-5);
        color: var(--color-text);
        line-height: 2;
        overflow-x: auto;
        margin-bottom: var(--space-4);
        border-left: 3px solid var(--color-gold);
    }

    .formula-block:last-child {
        margin-bottom: 0;
    }

    .tool-explanation {
        font-size: var(--text-sm);
        color: var(--color-text-muted);
        line-height: 1.8;
    }

    .tool-explanation p {
        margin-bottom: var(--space-3);
    }

    .tool-explanation ul {
        margin-bottom: var(--space-3);
        padding-left: var(--space-5);
    }

    .tool-explanation li {
        margin-bottom: var(--space-2);
    }

    /* RESPONSIVE */
    @media (max-width: 992px) {
        .tool-layout {
            grid-template-columns: 1fr;
        }

        .tool-panel {
            position: static;
        }
    }

    @media (max-width: 768px) {
        .tool-results-grid {
            grid-template-columns: 1fr 1fr;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="tool-page">
    <div class="container">
        <!-- Breadcrumb -->
        <nav class="tool-breadcrumb">
            <a href="/ferramentas">{{ t('nav_tools') }}</a>
            <span>/</span>
            <span>{{ tool.title }}</span>
        </nav>

        <!-- Header -->
        <div class="tool-header">
            <h1 class="tool-header__title">{{ tool.title }}</h1>
            <p class="tool-header__description">{{ tool.description }}</p>
        </div>

        {% block tool_content %}{% endblock %}
    </div>
</section>
{% endblock %}
